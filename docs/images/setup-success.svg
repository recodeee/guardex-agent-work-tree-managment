<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">gitguardex setup behavior outside git repository</title>
  <desc id="desc">Terminal screenshot showing gx status, gx setup failure outside a git repo, and gx init unknown command output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#080d18"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="980" fill="url(#bg)"/>
  <rect x="24" y="20" width="1452" height="940" rx="14" fill="#0f172a" stroke="#25314a"/>
  <circle cx="54" cy="48" r="8" fill="#ef4444"/>
  <circle cx="78" cy="48" r="8" fill="#f59e0b"/>
  <circle cx="102" cy="48" r="8" fill="#22c55e"/>
  <text x="130" y="53" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">gitguardex status + setup</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#e2e8f0">
    <text x="44" y="95">deadpool@recodee:~/Documents/testguardex$ gx</text>
    <text x="44" y="132" fill="#93c5fd">[gitguardex] CLI: @imdeadpool/guardex/5.0.0 linux-x64 node-v22.22.0</text>
    <text x="44" y="169" fill="#93c5fd">[gitguardex] Global services:</text>
    <text x="70" y="206" fill="#93c5fd">- ● oh-my-codex: active</text>
    <text x="70" y="243" fill="#93c5fd">- ● @fission-ai/openspec: active</text>
    <text x="44" y="280" fill="#93c5fd">[gitguardex] Repo safety service: ● inactive (no git repository at target).</text>

    <text x="44" y="337">deadpool@recodee:~/Documents/testguardex$ gx setup</text>
    <text x="44" y="374" fill="#67e8f9">[gitguardex] Already installed globally: oh-my-codex, @fission-ai/openspec</text>
    <text x="44" y="411" fill="#86efac">[gitguardex] ✅ OMX/OpenSpec global tools already installed. Skipping.</text>
    <text x="44" y="448" fill="#fca5a5">[gitguardex] Target is not inside a git repository: /home/deadpool/Documents/testguardex</text>
    <text x="44" y="485" fill="#fda4af">fatal: not a git repository (or any of the parent directories): .git</text>

    <text x="44" y="542">deadpool@recodee:~/Documents/testguardex$ gx</text>
    <text x="44" y="579" fill="#93c5fd">[gitguardex] CLI: @imdeadpool/guardex/5.0.0 linux-x64 node-v22.22.0</text>
    <text x="44" y="616" fill="#93c5fd">[gitguardex] Global services:</text>
    <text x="70" y="653" fill="#93c5fd">- ● oh-my-codex: active</text>
    <text x="70" y="690" fill="#93c5fd">- ● @fission-ai/openspec: active</text>
    <text x="44" y="727" fill="#93c5fd">[gitguardex] Repo safety service: ● inactive (no git repository at target).</text>

    <text x="44" y="784">deadpool@recodee:~/Documents/testguardex$ gx init</text>
    <text x="44" y="821" fill="#fda4af">[gitguardex] Unknown command: init</text>
    <text x="44" y="858">deadpool@recodee:~/Documents/testguardex$</text>
  </g>
</svg>
