<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">VS Code source control view with agent branches and OpenSpec files</title>
  <desc id="desc">A VS Code inspired source control window with two active agent branches, an editor tab, and OpenSpec task and spec files listed beside implementation files.</desc>

